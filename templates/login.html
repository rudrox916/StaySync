{% extends "base.html" %}
{% block title %}Login – StaySync{% endblock %}

{% block content %}
<div class="container py-5" style="min-height: 80vh; display:flex; align-items:center;">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-5">
            <div class="glass-panel p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-building-fill fs-1 text-primary"></i>
                    <h2 class="fw-bold mt-2">Welcome Back</h2>
                    <p class="text-muted">Sign in to your StaySync account</p>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control form-control-glass" id="username" name="username"
                                   placeholder="Enter your username" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control form-control-glass" id="password" name="password"
                                   placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                            <label class="form-check-label text-muted" for="remember_me">Remember me</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-3" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                <hr class="my-4 border-secondary">
                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
