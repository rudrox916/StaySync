{% extends "base.html" %}
{% block title %}Register – StaySync{% endblock %}

{% block content %}
<div class="container py-5" style="min-height: 80vh; display:flex; align-items:center;">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-5">
            <div class="glass-panel p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                    <h2 class="fw-bold mt-2">Create Account</h2>
                    <p class="text-muted">Join StaySync and manage your stays</p>
                </div>
                <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control form-control-glass" id="username" name="username"
                                   placeholder="Choose a username" required minlength="3">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control form-control-glass" id="email" name="email"
                                   placeholder="your@email.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control form-control-glass" id="password" name="password"
                                   placeholder="Create a strong password" required minlength="6">
                        </div>
                        <div class="form-text text-muted mt-1">Minimum 6 characters</div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-3" id="registerBtn">
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>
                <hr class="my-4 border-secondary">
                <p class="text-center text-muted mb-0">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold text-decoration-none">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
