{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}
{% block content %}
<div class="container py-5 text-center" style="min-height:70vh;display:flex;align-items:center;justify-content:center;">
    <div>
        <div class="display-1 fw-bold text-primary mb-3">404</div>
        <h2 class="fw-bold mb-2">Page Not Found</h2>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or was moved.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary-custom px-5">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
